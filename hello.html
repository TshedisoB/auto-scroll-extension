<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Auto Scroll</title>
    <style>
      body {
        margin: 0;
        padding: 14px;
        font-family: Arial, sans-serif;
        min-width: 260px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      p {
        margin: 6px 0;
        font-size: 12px;
        color: #333;
      }

      #status {
        font-weight: bold;
      }
    </style>
  </head>
  
  <body>
    <h1>Auto Scroll</h1>
    <div class="row">
      <label for="enabled">Enabled</label>
      <input type="checkbox" id="enabled" />
    </div>
    <p>Press <b>Down</b> to auto-scroll down.</p>
    <p>Press <b>Up</b> to auto-scroll up.</p>
    <p>Press any other key to stop.</p>
    <p id="status">Status: Loading...</p>
    <script src="popup.js"></script>
  </body>
</html>
